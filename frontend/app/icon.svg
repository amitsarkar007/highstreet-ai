<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background gradient - deep dark navy -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0d2e;stop-opacity:1" />
    </linearGradient>
    <!-- Warm amber glow for the AI node -->
    <radialGradient id="glowGrad" cx="50%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#ffaa44;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:0" />
    </radialGradient>
    <!-- Awning gradient -->
    <linearGradient id="awningGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35" />
      <stop offset="50%" style="stop-color:#ffaa44" />
      <stop offset="100%" style="stop-color:#ff6b35" />
    </linearGradient>
    <!-- Building gradient -->
    <linearGradient id="buildingGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3a" />
      <stop offset="100%" style="stop-color:#12122a" />
    </linearGradient>
    <!-- Glow filter for AI node -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="16" fill="url(#bgGrad)"/>

  <!-- Ambient glow behind building -->
  <ellipse cx="50" cy="55" rx="38" ry="28" fill="url(#glowGrad)"/>

  <!-- === BUILDING STRUCTURE === -->

  <!-- Main building body -->
  <rect x="14" y="46" width="72" height="42" rx="2" fill="url(#buildingGrad)"/>

  <!-- Building outline -->
  <rect x="14" y="46" width="72" height="42" rx="2" fill="none" stroke="#2a2a4a" stroke-width="0.8"/>

  <!-- Roof / parapet -->
  <rect x="12" y="42" width="76" height="6" rx="2" fill="#1a1a35"/>
  <rect x="12" y="42" width="76" height="6" rx="2" fill="none" stroke="#2a2a4a" stroke-width="0.8"/>

  <!-- Chimney left -->
  <rect x="22" y="34" width="7" height="10" rx="1" fill="#151528"/>
  <rect x="22" y="34" width="7" height="10" rx="1" fill="none" stroke="#2a2a4a" stroke-width="0.6"/>

  <!-- Chimney right -->
  <rect x="71" y="37" width="5" height="7" rx="1" fill="#151528"/>
  <rect x="71" y="37" width="5" height="7" rx="1" fill="none" stroke="#2a2a4a" stroke-width="0.6"/>

  <!-- === AWNING === -->
  <!-- Awning body -->
  <path d="M14 52 Q50 58 86 52 L86 48 Q50 54 14 48 Z" fill="url(#awningGrad)"/>
  <!-- Awning scallop trim -->
  <path d="M14 52 Q18 55 22 52 Q26 55 30 52 Q34 55 38 52 Q42 55 46 52 Q50 55 54 52 Q58 55 62 52 Q66 55 70 52 Q74 55 78 52 Q82 55 86 52" 
        fill="none" stroke="#ff6b35" stroke-width="1.2" opacity="0.7"/>

  <!-- === WINDOWS === -->
  <!-- Left window frame -->
  <rect x="18" y="56" width="18" height="14" rx="2" fill="#0d0d1a" stroke="#ff6b35" stroke-width="0.8" opacity="0.9"/>
  <!-- Left window warm light -->
  <rect x="19.5" y="57.5" width="15" height="11" rx="1.5" fill="#1a0d05" opacity="0.8"/>
  <!-- Left window glow lines (blinds/shelves) -->
  <line x1="20" y1="61" x2="35" y2="61" stroke="#ff6b35" stroke-width="0.4" opacity="0.4"/>
  <line x1="20" y1="64" x2="35" y2="64" stroke="#ff6b35" stroke-width="0.4" opacity="0.4"/>
  <!-- Left window warm glow -->
  <rect x="19.5" y="57.5" width="15" height="11" rx="1.5" fill="#ff8c42" opacity="0.08"/>

  <!-- Right window frame -->
  <rect x="64" y="56" width="18" height="14" rx="2" fill="#0d0d1a" stroke="#ff6b35" stroke-width="0.8" opacity="0.9"/>
  <!-- Right window warm light -->
  <rect x="65.5" y="57.5" width="15" height="11" rx="1.5" fill="#1a0d05" opacity="0.8"/>
  <!-- Right window glow lines -->
  <line x1="66" y1="61" x2="79" y2="61" stroke="#ff6b35" stroke-width="0.4" opacity="0.4"/>
  <line x1="66" y1="64" x2="79" y2="64" stroke="#ff6b35" stroke-width="0.4" opacity="0.4"/>
  <!-- Right window warm glow -->
  <rect x="65.5" y="57.5" width="15" height="11" rx="1.5" fill="#ff8c42" opacity="0.08"/>

  <!-- === DOOR === -->
  <rect x="40" y="62" width="20" height="26" rx="2" fill="#0d0d1a" stroke="#ffaa44" stroke-width="0.8"/>
  <!-- Door arch top -->
  <path d="M40 64 Q50 58 60 64" fill="#0d0d1a" stroke="#ffaa44" stroke-width="0.8"/>
  <!-- Door handle -->
  <circle cx="56" cy="76" r="1.2" fill="#ffaa44" opacity="0.7"/>
  <!-- Door panel lines -->
  <line x1="50" y1="64" x2="50" y2="88" stroke="#1a1a35" stroke-width="0.6"/>

  <!-- === PAVEMENT / STEP === -->
  <rect x="10" y="87" width="80" height="4" rx="1" fill="#1a1a35" stroke="#2a2a4a" stroke-width="0.5"/>

  <!-- === AI NEURAL NODE — floating above building === -->
  <!-- Outer ring pulse -->
  <circle cx="50" cy="22" r="11" fill="none" stroke="#ff6b35" stroke-width="0.6" opacity="0.3"/>
  <circle cx="50" cy="22" r="8.5" fill="none" stroke="#ffaa44" stroke-width="0.5" opacity="0.5"/>
  <!-- Node connections (neural network lines) -->
  <line x1="50" y1="22" x2="35" y2="30" stroke="#ff6b35" stroke-width="0.6" opacity="0.4"/>
  <line x1="50" y1="22" x2="65" y2="30" stroke="#ff6b35" stroke-width="0.6" opacity="0.4"/>
  <line x1="50" y1="22" x2="50" y2="35" stroke="#ffaa44" stroke-width="0.7" opacity="0.5"/>
  <!-- Small satellite nodes -->
  <circle cx="35" cy="30" r="1.8" fill="#ff6b35" opacity="0.6" filter="url(#glow)"/>
  <circle cx="65" cy="30" r="1.8" fill="#ff6b35" opacity="0.6" filter="url(#glow)"/>
  <!-- Main AI node -->
  <circle cx="50" cy="22" r="6.5" fill="#1a0d05"/>
  <circle cx="50" cy="22" r="6.5" fill="none" stroke="#ffaa44" stroke-width="1"/>
  <!-- Inner core glow -->
  <circle cx="50" cy="22" r="4" fill="#ff6b35" opacity="0.15" filter="url(#glow)"/>
  <circle cx="50" cy="22" r="2.5" fill="#ffaa44" filter="url(#glow)"/>
  <!-- Node centre dot -->
  <circle cx="50" cy="22" r="1.2" fill="#fff" opacity="0.9"/>
</svg>
